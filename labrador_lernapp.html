<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Lernapp – Labrador</title>
  <style>
    :root{ --bg:#f4f6f8; --card:#fff; --ok:#b9f6ca; --bad:#ffb3b3; --btn:#e7edf5; --next:#16a34a; --dark:#334155; }
    *{ box-sizing:border-box; }
    body{
      margin:0; padding:16px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
    }
    .card{
      width:min(720px, 100%);
      background:var(--card);
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.12);
      padding:18px;
    }
    h1{ font-size:22px; margin:0 0 10px; line-height:1.25; }
    .meta{ display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; color:#475569; font-size:14px; margin-bottom:10px; }
    .answers{ margin-top:10px; }
    .answers button{
      width:100%;
      border:0;
      border-radius:12px;
      padding:14px 12px;
      margin:8px 0;
      font-size:16px;
      background:var(--btn);
      text-align:left;
    }
    .answers button:active{ transform:scale(.99); }
    .correct{ background:var(--ok)!important; }
    .wrong{ background:var(--bad)!important; }
    .row{ display:flex; gap:10px; margin-top:12px; }
    .row button{
      flex:1;
      border:0;
      border-radius:12px;
      padding:14px 12px;
      font-size:16px;
      color:#fff;
    }
